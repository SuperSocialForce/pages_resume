<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Resume</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <article id="resume" class="resume" aria-live="polite"></article>
      <p id="error" class="error" hidden>
        Could not load <code>resume.md</code>. Check that the file exists in the
        <code>site/</code> directory.
      </p>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
      const resume = document.getElementById("resume");
      const error = document.getElementById("error");

      fetch("./resume.md")
        .then((response) => {
          if (!response.ok) {
            throw new Error("Failed to fetch markdown");
          }
          return response.text();
        })
        .then((markdown) => {
          marked.setOptions({
            breaks: true,
            gfm: true
          });
          resume.innerHTML = marked.parse(markdown);
        })
        .catch(() => {
          error.hidden = false;
        });
    </script>
  </body>
</html>
