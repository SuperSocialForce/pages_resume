<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Resume</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <nav class="lang-switch" aria-label="Language switcher">
        <a href="./?lang=ja">日本語</a>
        <span aria-hidden="true">/</span>
        <a href="./?lang=en">English</a>
      </nav>
      <article id="resume" class="resume" aria-live="polite"></article>
      <p id="error" class="error" hidden>
        Could not load <code>resume.md</code>. Check that the file exists in the
        <code>site/</code> directory.
      </p>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
      const resume = document.getElementById("resume");
      const error = document.getElementById("error");
      const params = new URLSearchParams(window.location.search);
      const lang = params.get("lang") === "en" ? "en" : "ja";
      const markdownFile = lang === "en" ? "./resume_en.md" : "./resume.md";

      fetch(markdownFile)
        .then((response) => {
          if (!response.ok) {
            throw new Error("Failed to fetch markdown");
          }
          return response.text();
        })
        .then((markdown) => {
          marked.setOptions({
            breaks: true,
            gfm: true
          });
          resume.innerHTML = marked.parse(markdown);
        })
        .catch(() => {
          error.hidden = false;
        });
    </script>
  </body>
</html>
